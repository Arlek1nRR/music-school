<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход · Админ-панель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-login">
  <div class="login-wrap">
    <form class="login-card" id="login-form" novalidate>
      <h1>Вход в админ-панель</h1>
      <p>Введите учётные данные администратора школы.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="admin@example.com" />
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
      </div>

      <button type="submit" class="btn btn-primary" id="login-btn">Войти</button>
      <div class="login-error" id="login-error" hidden></div>
      <div class="login-hint">Страница скрыта от посетителей сайта.</div>
    </form>
  </div>

  <script type="module" src="admin-login.js"></script>
</body>
</html>
